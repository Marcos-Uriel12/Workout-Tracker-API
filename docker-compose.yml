services:
  api:
    build: .
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/workout_tracker
      - SECRET_KEY=unaclavesecretamuylargarandom123456
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=workout_tracker
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: